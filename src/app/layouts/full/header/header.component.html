<mat-toolbar class="topbar gap-10">

  <!-- Mobile Menu -->
  
  <button mat-icon-button (click)="toggleMobileNav.emit()" class="d-flex d-lg-none justify-content-center">
    <i-tabler name="menu-2" class="icon-20 d-flex"></i-tabler>
  </button>

  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Notifications">
    <i-tabler class="d-flex" name="bell" matBadge="1" matBadgeColor="primary"></i-tabler>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item>Item 1</button>
    <button mat-menu-item>Item 2</button>
  </mat-menu>


  <span class="flex-1-auto"></span>

  <!-- --------------------------------------------------------------- -->
  <!-- profile Dropdown -->
  <!-- --------------------------------------------------------------- -->
  <button mat-mini-fab [matMenuTriggerFor]="profilemenu" aria-label="Notifications">
    <app-avatar-macaron
      [imageSrc]="isAdminContext ? null : auth.avatarDataUri()"
      [prenom]="isAdminContext ? 'Admin' : auth.getSelectedPersonneDisplay().prenom"
      [nom]="isAdminContext ? '' : auth.getSelectedPersonneDisplay().nom"
      [size]="35"
    />
  </button>
  <mat-menu #profilemenu="matMenu" class="cardWithShadow topbar-dd">
    <ng-container *ngIf="!isAdminContext">
      <button mat-menu-item [routerLink]="['/profile']">
        <mat-icon class="d-flex align-items-center"><i-tabler name="user" class="icon-18 d-flex"></i-tabler></mat-icon>Mon
        profil
      </button>
      <button mat-menu-item>
        <mat-icon class="d-flex align-items-center"><i-tabler name="mail" class="icon-18 d-flex"></i-tabler></mat-icon>My
        Account
      </button>
      <button mat-menu-item [routerLink]="['/person']">
        <mat-icon class="d-flex align-items-center"><i-tabler name="users" class="icon-18 d-flex"></i-tabler></mat-icon>Changer de personne
      </button>
      <button mat-menu-item>
        <mat-icon class="d-flex align-items-center"><i-tabler name="list-check"
            class="icon-18 d-flex"></i-tabler></mat-icon>My Task
      </button>
    </ng-container>

    <div class="p-x-12 m-t-12">
      <button (click)="logout()" mat-stroked-button class="w-100">Logout</button>
    </div>
  </mat-menu>
</mat-toolbar>
