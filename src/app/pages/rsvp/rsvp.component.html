<mat-card class="cardWithShadow">
	<mat-card-title>RSVP — Modifier mes réponses</mat-card-title>
	<mat-card-content>
		<div *ngIf="loading">Chargement…</div>

		<form [formGroup]="form" *ngIf="!loading">
			<div *ngIf="personnes.length === 0">Aucune personne trouvée pour votre famille.</div>

					<div class="rsvp-grid">
						<div class="rsvp-header">
							<div class="person-col">Personne</div>
							<div class="events-col">
								<div class="event-title">Réception</div>
								<div class="event-title">Repas</div>
								<div class="event-title">Soirée</div>
							</div>
						</div>

						<div formArrayName="personnes">
							<div *ngFor="let ctrl of personnesArray.controls; let i = index" [formGroupName]="i" class="person-row">
								<div class="person-col">
									<div class="avatar" aria-hidden="true">{{ (personnes[i].prenom || '').charAt(0) || '' }}{{ (personnes[i].nom || '').charAt(0) || '' }}</div>
									<div class="person-name">{{ personnes[i].prenom }} {{ personnes[i].nom }}</div>
								</div>

								<div class="events-col">
									<mat-checkbox class="event-checkbox" formControlName="present_reception" [disabled]="!personnes[i].invite_reception" aria-label="Présence réception"></mat-checkbox>
									<mat-checkbox class="event-checkbox" formControlName="present_repas" [disabled]="!personnes[i].invite_repas" aria-label="Présence repas"></mat-checkbox>
									<mat-checkbox class="event-checkbox" formControlName="present_soiree" [disabled]="!personnes[i].invite_soiree" aria-label="Présence soirée"></mat-checkbox>
								</div>
							</div>
						</div>
					</div>

			<div class="form-actions">
				<button mat-raised-button color="primary" type="button" (click)="submit()" [disabled]="saving">Enregistrer</button>
				<button mat-button type="button" (click)="cancel()" [disabled]="saving">Annuler</button>
			</div>
		</form>
	</mat-card-content>
</mat-card>
