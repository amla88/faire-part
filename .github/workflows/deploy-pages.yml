name: Deploy to IONOS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Copie du fallback SPA (404.html)
        run: cp -f dist/faire-part/browser/index.html dist/faire-part/browser/404.html

      - name: Injection des clés Supabase dans les meta tags
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          for f in dist/faire-part/browser/index.html dist/faire-part/browser/404.html; do
            if grep -q 'name="supabase-url"' "$f"; then
              sed -i "s|<meta name=\"supabase-url\" content=\"[^\"]*\">|<meta name=\"supabase-url\" content=\"${SUPABASE_URL}\">|g" $f
            else
              sed -i "1,/<\/head>/s|</head>|  <meta name=\"supabase-url\" content=\"${SUPABASE_URL}\">\n</head>|" $f
            fi
            if grep -q 'name="supabase-anon-key"' "$f"; then
              sed -i "s|<meta name=\"supabase-anon-key\" content=\"[^\"]*\">|<meta name=\"supabase-anon-key\" content=\"${SUPABASE_ANON_KEY}\">|g" $f
            else
              sed -i "1,/<\/head>/s|</head>|  <meta name=\"supabase-anon-key\" content=\"${SUPABASE_ANON_KEY}\">\n</head>|" $f
            fi
          done

      - name: Injection meta date mariage (compte à rebours jeu)
        env:
          WEDDING_DATE_ISO: ${{ secrets.WEDDING_DATE_ISO }}
        run: |
          if [ -z "${WEDDING_DATE_ISO:-}" ]; then
            echo "WEDDING_DATE_ISO non défini — compte à rebours jeu sans date cible (optionnel)."
            exit 0
          fi
          for f in dist/faire-part/browser/index.html dist/faire-part/browser/404.html; do
            if grep -q 'name="wedding-date-iso"' "$f"; then
              sed -i "s|<meta name=\"wedding-date-iso\" content=\"[^\"]*\">|<meta name=\"wedding-date-iso\" content=\"${WEDDING_DATE_ISO}\">|g" "$f"
            else
              sed -i "1,/<\/head>/s|</head>|  <meta name=\"wedding-date-iso\" content=\"${WEDDING_DATE_ISO}\">\n</head>|" "$f"
            fi
          done

      - name: Deploy PHP API (photos + Spotify)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
        run: |
          mkdir -p dist/faire-part/browser/api
          cp -f ionos/api/photos-upload.php dist/faire-part/browser/api/photos-upload.php
          cp -f ionos/api/photos-list.php dist/faire-part/browser/api/photos-list.php
          cp -f ionos/api/photos-delete.php dist/faire-part/browser/api/photos-delete.php
          cp -f ionos/api/spotify-search.php dist/faire-part/browser/api/spotify-search.php
          cp -f ionos/api/spotify-playlist-add.php dist/faire-part/browser/api/spotify-playlist-add.php
          sed "s|\"supabase-url\": \"\"|\"supabase-url\": \"${SUPABASE_URL}\"|; s|\"supabase-anon-key\": \"\"|\"supabase-anon-key\": \"${SUPABASE_ANON_KEY}\"|; s|\"spotify-client-id\": \"\"|\"spotify-client-id\": \"${SPOTIFY_CLIENT_ID}\"|; s|\"spotify-client-secret\": \"\"|\"spotify-client-secret\": \"${SPOTIFY_CLIENT_SECRET}\"|" ionos/api/supabase-meta.json > dist/faire-part/browser/api/supabase-meta.json
          node -e "require('fs').writeFileSync('dist/faire-part/browser/api/spotify-meta.json', JSON.stringify({'spotify-refresh-token':process.env.SPOTIFY_REFRESH_TOKEN||'','spotify-playlist-id':process.env.SPOTIFY_PLAYLIST_ID||''}));"

      - name: Deploy to IONOS via LFTP
        env:
          FTP_SERVER: ${{ secrets.SFTP_SERVER }}
          FTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "sftp://$FTP_SERVER:22" -e "set sftp:auto-confirm yes; mirror -R --exclude-glob assets-mariage/ --exclude-glob assets-mariage/* ./dist/faire-part/browser/ public; quit"
